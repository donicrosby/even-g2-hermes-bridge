<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Bridge Test</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  #log { background: #111; color: #0f0; font-family: monospace; padding: 1rem; height: 300px; overflow: auto; white-space: pre-wrap; }
  .status { margin: 0.5rem 0; padding: 0.5rem; border-radius: 4px; }
  .ok { background: #d4edda; color: #155724; }
  .err { background: #f8d7da; color: #721c24; }
  button { padding: 0.5rem 1rem; margin-right: 0.5rem; }
</style>
</head>
<body>
<h1>Hermes Bridge WebSocket Test</h1>
<div id="conn" class="status ok">Disconnected</div>
<button id="connect">Connect</button>
<button id="disconnect" disabled>Disconnect</button>
<button id="clear">Clear Log</button>
<button id="send-text">Send Test Text</button>
<hr>
<div id="log"></div>
<script>
  const $ = id => document.getElementById(id);
  const log = msg => { $('log').textContent += msg + '\n'; $('log').scrollTop = $('log').scrollHeight; };
  let ws = null;
  $('connect').onclick = () => {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws/glasses`;
    log('Connecting to ' + url);
    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => {
      $('conn').textContent = 'Connected'; $('conn').className = 'status ok';
      $('connect').disabled = true; $('disconnect').disabled = false; log('Opened');
    };
    ws.onmessage = ev => { const msg = JSON.parse(ev.data); log('<- ' + JSON.stringify(msg)); };
    ws.onclose = () => {
      $('conn').textContent = 'Disconnected'; $('conn').className = 'status err';
      $('connect').disabled = false; $('disconnect').disabled = true; log('Closed'); ws = null;
    };
    ws.onerror = e => log('Error: ' + e);
  };
  $('disconnect').onclick = () => { if (ws) ws.close(); };
  $('clear').onclick = () => $('log').textContent = '';
  $('send-text').onclick = () => {
    if (!ws || ws.readyState !== 1) return log('Not connected');
    ws.send(JSON.stringify({action: 'clear'}));
    log('-> {\"action\":\"clear\"}');
  };
</script>
</body>
</html>
