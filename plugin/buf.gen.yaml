version: v2
inputs:
  - directory: proto
plugins:
  # Python: built-in protoc plugin generates hermes_bridge_pb2.py (runtime).
  - protoc_builtin: python
    out: src/byoa_plugin/proto_gen

  # Python: typed stubs via mypy-protobuf (installed in plugin/.venv).
  # Generates hermes_bridge_pb2.pyi alongside the runtime module.
  - local: protoc-gen-mypy
    out: src/byoa_plugin/proto_gen

  # TypeScript: ts-proto (installed in glasses-app/node_modules).
  # Produces hermes_bridge.ts with idiomatic types + oneof helpers.
  - local: protoc-gen-ts_proto
    out: ../glasses-app/src/proto_gen
