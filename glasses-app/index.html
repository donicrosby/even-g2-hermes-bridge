<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes on G2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.4;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 8px;
    }
    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #content {
      flex: 1;
      overflow-y: auto;
      word-break: break-word;
    }
    .title {
      color: #0ff;
      font-weight: bold;
      margin-top: 8px;
    }
    .text { color: #0f0; }
    .error { color: #f44; }
    #mic {
      position: fixed;
      bottom: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #0f0;
    }
    #mic.on { background: #0f0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status">Tap side to talk</div>
    <div id="content"></div>
  </div>
  <div id="mic"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
