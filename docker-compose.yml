services:
  bridge:
    build:
      context: ./bridge-server
      dockerfile: Dockerfile
    container_name: even-g2-hermes-bridge
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - LITELLM_BASE_URL=${LITELLM_BASE_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL}
      - BYOA_TOKEN=${BYOA_TOKEN}
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-}
      - MAX_HISTORY_TURNS=${MAX_HISTORY_TURNS:-10}
      - DEDUP_WINDOW_SECONDS=${DEDUP_WINDOW_SECONDS:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      - SSL_KEY_FILE=${SSL_KEY_FILE:-}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-bridge.rule=Host(`${BRIDGE_HOST:-hermes.local}`)"
      - "traefik.http.routers.hermes-bridge.entrypoints=websecure"
      - "traefik.http.routers.hermes-bridge.tls=true"
      - "traefik.http.routers.hermes-bridge.tls.certresolver=${TRAEFIK_CERTRESOLVER:-smallstep}"
      - "traefik.http.services.hermes-bridge.loadbalancer.server.port=8765"

networks:
  traefik:
    external: true
